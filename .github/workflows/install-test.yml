name: Install smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  install-smoke:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run tests
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pytest -q

      - name: Local installer smoke (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          CODEX_HOME="$RUNNER_TEMP/codex-home" CODEX_PET_MAKER_SKIP_VENV=1 ./install.sh
          test -f "$RUNNER_TEMP/codex-home/skills/codex-pet-maker/SKILL.md"
          test -f "$RUNNER_TEMP/codex-home/skills/codex-pet-maker/install.ps1"
          test -f "$RUNNER_TEMP/codex-home/skills/codex-pet-maker/docs/assets/examples/cap-coder-spritesheet.png"

      - name: PowerShell installer smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:CODEX_HOME = Join-Path $env:RUNNER_TEMP 'codex-home'
          $env:CODEX_PET_MAKER_SKIP_VENV = '1'
          .\install.ps1
          if (!(Test-Path (Join-Path $env:CODEX_HOME 'skills/codex-pet-maker/SKILL.md'))) { throw 'SKILL.md missing' }
          if (!(Test-Path (Join-Path $env:CODEX_HOME 'skills/codex-pet-maker/install.sh'))) { throw 'install.sh missing' }
          if (!(Test-Path (Join-Path $env:CODEX_HOME 'skills/codex-pet-maker/docs/assets/examples/cap-coder-spritesheet.png'))) { throw 'example asset missing' }
